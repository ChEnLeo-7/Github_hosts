name: STEAM_DNS_RESOLVE

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      cidr:
        description: "CIDR for the target area"
        required: true
        default: '127.0.0.0/8'
      server:
        description: "DoH Server (Must support ECS)"
        required: true
        default: 'https://dns.google/dns-query'
      output:
        description: "output file"
        required: true
        default: './steam-hosts'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up Python 3.10
        uses: actions/setup-python@v2
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 关键修复：为 schedule 触发提供默认参数
      - name: Run script
        run: |
          CIDR="${{ github.event.inputs.cidr || '127.0.0.0/8' }}"
          SERVER="${{ github.event.inputs.server || 'https://dns.google/dns-query' }}"
          OUTPUT="${{ github.event.inputs.output || './steam-hosts' }}"
          python dns_resolve.py -c "$CIDR" -s "$SERVER" -o "$OUTPUT" -d ./domains-steam.txt

      - name: Commit Changes
        id: commit
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: 🚀 CI Updated

      - name: GitHub Push
        if: steps.commit.outputs.changes_detected == 'true'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          branch: ${{github.ref}}

      - name: Delete Workflow Runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{secrets.GITHUB_TOKEN}}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 1
